<!DOCTYPE html>
<html>
<head>
    <title>Orange Arena</title>
    <style>
        body { 
            margin: 0; background: #0f0f0f; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        canvas { box-shadow: 0 0 30px rgba(255, 140, 0, 0.2); border-radius: 10px; border: 2px solid #333; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; }
        .orange { color: #ff8c00; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">
        <h2><span class="orange">ORANGE</span> ARENA</h2>
        <p>WASD to Move | SPACE to Shoot</p>
        <h3>HP: <span id="hp-display" class="orange">100</span></h3>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
// --- GAME SETUP ---
const nick = prompt("Enter Nickname:") || "Baller";
const myColor = `hsl(${Math.random() * 360}, 80%, 60%)`;
const socket = io();

const { Engine, Render, Runner, Bodies, Composite, Body, Events, Vector } = Matter;
const engine = Engine.create();
engine.gravity.y = 0; // Top-down = no gravity

const render = Render.create({
    element: document.body,
    engine: engine,
    options: { width: 800, height: 600, wireframes: false, background: '#1a1a1a' }
});

// --- PLAYER SETUP ---
let myId = null;
let hp = 100;
const player = Bodies.circle(400, 300, 20, { 
    frictionAir: 0.2, // High friction so you stop when you let go of keys
    restitution: 0.2,
    render: { fillStyle: myColor, strokeStyle: '#fff', lineWidth: 3 }
});
Composite.add(engine.world, player);

let others = {};
let bullets = [];
let lastDir = { x: 1, y: 0 };
const keys = {};

// --- SOCKET LOGIC ---
socket.on('init', data => {
    myId = data.myId;
    Body.setPosition(player, { x: data.players[myId].x, y: data.players[myId].y });
    
    // Load Other Players
    others = data.players;
    delete others[myId]; // Don't draw yourself twice

    // Build Map Walls
    data.mapWalls.forEach(w => {
        const wall = Bodies.rectangle(w.x, w.y, w.w, w.h, { 
            isStatic: true, render: { fillStyle: '#333' } 
        });
        Composite.add(engine.world, wall);
    });
});

socket.on('newPlayer', p => others[p.id] = p);
socket.on('updatePlayer', p => others[p.id] = p);
socket.on('removePlayer', id => delete others[id]);

// Receive Opponent Bullets
socket.on('opponentShot', d => {
    fireBullet(d.x, d.y, d.dir, false);
});

// Handle HP and Death
socket.on('updateHP', d => {
    if (d.id === myId) {
        hp = d.hp;
        document.getElementById('hp-display').innerText = hp;
    } else if (others[d.id]) {
        others[d.id].hp = d.hp;
    }
});

socket.on('respawn', d => {
    if (d.id === myId) {
        hp = 100;
        document.getElementById('hp-display').innerText = hp;
        Body.setPosition(player, { x: d.x, y: d.y });
        Body.setVelocity(player, { x: 0, y: 0 });
    } else if (others[d.id]) {
        others[d.id].hp = 100;
        others[d.id].x = d.x;
        others[d.id].y = d.y;
    }
});

// --- INPUT & MOVEMENT ---
window.onkeydown = e => { 
    keys[e.code] = true; 
    if(e.code === 'Space' && !e.repeat) {
        fireBullet(player.position.x, player.position.y, lastDir, true);
    }
};
window.onkeyup = e => keys[e.code] = false;

Events.on(engine, 'beforeUpdate', () => {
    // 1. Movement Logic (Using applyForce stops wall-ghosting)
    const force = 0.003;
    let dx = 0, dy = 0;
    
    if (keys['KeyW']) dy = -1; if (keys['KeyS']) dy = 1;
    if (keys['KeyA']) dx = -1; if (keys['KeyD']) dx = 1;

    if (dx !== 0 || dy !== 0) {
        // Normalize direction so diagonal isn't faster
        const length = Math.sqrt(dx*dx + dy*dy);
        lastDir = { x: dx/length, y: dy/length };
        Body.applyForce(player, player.position, { x: lastDir.x * force, y: lastDir.y * force });
    }

    // 2. Hit Detection (Check if MY bullets hit OPPONENTS)
    bullets.forEach(b => {
        if (b.isMine) {
            Object.values(others).forEach(opp => {
                const dist = Math.hypot(b.body.position.x - opp.x, b.body.position.y - opp.y);
                if (dist < 25) { // 20 radius + 5 bullet radius
                    socket.emit('hit', opp.id);
                    Composite.remove(engine.world, b.body);
                    b.dead = true;
                }
            });
        }
    });

    // Cleanup dead bullets
    bullets = bullets.filter(b => !b.dead);

    // Sync my position to the server
    socket.emit('move', { x: player.position.x, y: player.position.y });
});

// --- COMBAT LOGIC ---
function fireBullet(px, py, dir, isMine) {
    // Spawn bullet outside the player so it doesn't get stuck
    const startX = px + dir.x * 30;
    const startY = py + dir.y * 30;

    const b = Bodies.circle(startX, startY, 6, {
        restitution: 1, // Bouncy
        frictionAir: 0, friction: 0,
        render: { fillStyle: isMine ? '#ff8c00' : '#ff3333' }
    });

    Body.setVelocity(b, { x: dir.x * 12, y: dir.y * 12 });
    Composite.add(engine.world, b);
    
    const bulletData = { body: b, isMine: isMine, bounces: 0, dead: false };
    bullets.push(bulletData);

    if (isMine) socket.emit('shoot', { x: startX, y: startY, dir: dir });
}

// Bounce Logic
Events.on(engine, 'collisionStart', (event) => {
    event.pairs.forEach(pair => {
        bullets.forEach(b => {
            if (pair.bodyA === b.body || pair.bodyB === b.body) {
                b.bounces++;
                if (b.bounces >= 3) {
                    Composite.remove(engine.world, b.body);
                    b.dead = true;
                }
            }
        });
    });
});

// --- CUSTOM DRAWING (Opponents & Health Bars) ---
Events.on(render, 'afterRender', () => {
    const ctx = render.context;
    
    Object.values(others).forEach(p => {
        // Draw Opponent Ball
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 20, 0, Math.PI * 2);
        ctx.fill();

        // Draw Name
        ctx.fillStyle = "white";
        ctx.font = "bold 12px Arial";
        ctx.textAlign = "center";
        ctx.fillText(p.name, p.x, p.y - 35);

        // Draw Health Bar
        ctx.fillStyle = "red";
        ctx.fillRect(p.x - 20, p.y - 30, 40, 5);
        ctx.fillStyle = "#00ff00";
        ctx.fillRect(p.x - 20, p.y - 30, (p.hp / 100) * 40, 5);
    });
});

// Start Game
socket.emit('join', { name: nick, color: myColor });
Render.run(render);
Runner.run(Runner.create(), engine);
</script>
</body>
</html>
