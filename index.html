<!DOCTYPE html>
<html>
<head>
    <title>Orange Arena</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; }
        #ui { 
            position: fixed; top: 10px; left: 10px; 
            color: #ff8c00; font-family: 'Courier New', Courier, monospace; 
            text-shadow: 2px 2px black; pointer-events: none; 
        }
    </style>
</head>
<body>
    <div id="ui">
        <b>ORANGE ARENA v1.0</b><br>
        WASD: Move | SPACE: Shoot<br>
        HP: <span id="hp-val">100</span>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const nick = prompt("Enter Nickname:") || "Player";
const myColor = `hsl(${Math.random() * 360}, 80%, 60%)`;
const socket = io();

const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;
const engine = Engine.create();
engine.gravity.y = 0; // Top-down mode

const render = Render.create({
    element: document.body,
    engine: engine,
    options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: '#1a1a1a' }
});

// 1. The Player
let hp = 100;
const player = Bodies.circle(400, 300, 20, { 
    frictionAir: 0, 
    restitution: 0,
    render: { fillStyle: myColor, strokeStyle: '#ffffff', lineWidth: 4 }
});
Composite.add(engine.world, player);

let bullets = [];
let others = {};
let lastDir = { x: 1, y: 0 }; // Default shooting direction (Right)

const keys = {};
window.onkeydown = e => {
    keys[e.code] = true;
    // Shooting on Space
    if (e.code === 'Space') shoot();
};
window.onkeyup = e => keys[e.code] = false;

function shoot() {
    const bullet = Bodies.circle(player.position.x, player.position.y, 6, {
        frictionAir: 0,
        label: 'bullet',
        render: { fillStyle: '#ff8c00' }
    });
    
    // Fire in the direction of movement
    const speed = 12;
    Body.setVelocity(bullet, { x: lastDir.x * speed, y: lastDir.y * speed });
    
    bullets.push(bullet);
    Composite.add(engine.world, bullet);
    socket.emit('shoot', { x: player.position.x, y: player.position.y, dir: lastDir });
}

Events.on(engine, 'beforeUpdate', () => {
    let vx = 0;
    let vy = 0;
    const speed = 6;

    if (keys['KeyW']) vy = -speed;
    if (keys['KeyS']) vy = speed;
    if (keys['KeyA']) vx = -speed;
    if (keys['KeyD']) vx = speed;

    // Update facing direction for shooting
    if (vx !== 0 || vy !== 0) {
        lastDir = { x: vx / speed, y: vy / speed };
    }

    Body.setVelocity(player, { x: vx, y: vy });

    // Boundary Check
    if (player.position.x < 0) Body.setPosition(player, {x: window.innerWidth, y: player.position.y});
    if (player.position.x > window.innerWidth) Body.setPosition(player, {x: 0, y: player.position.y});

    socket.emit('move', { x: player.position.x, y: player.position.y, color: myColor, name: nick });
});

// 2. Custom Drawing for Health and Names
Events.on(render, 'afterRender', () => {
    const ctx = render.context;
    
    // Draw My Name/HP
    ctx.fillStyle = "white";
    ctx.font = "bold 14px Arial";
    ctx.textAlign = "center";
    ctx.fillText(nick, player.position.x, player.position.y - 35);
    
    // HP Bar
    ctx.fillStyle = "red";
    ctx.fillRect(player.position.x - 20, player.position.y - 30, 40, 5);
    ctx.fillStyle = "#00ff00";
    ctx.fillRect(player.position.x - 20, player.position.y - 30, (hp / 100) * 40, 5);
});

Render.run(render);
Runner.run(Runner.create(), engine);
</script>
</body>
</html>
