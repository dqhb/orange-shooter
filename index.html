<!DOCTYPE html>
<html>
<head>
    <title>Orange Stickman Parkour</title>
    <style>
        body { margin: 0; overflow: hidden; background: #ff8c00; } /* Orange Background */
        #ui { position: fixed; top: 10px; left: 10px; color: white; font-family: sans-serif; text-shadow: 2px 2px #000; z-index: 20; }
    </style>
</head>
<body>
    <div id="ui">Use W, A, D to move. Watch out for the saws!</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const nick = prompt("Enter Nickname:") || "Stickman";
const socket = io();
const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;

const engine = Engine.create();
const render = Render.create({ 
    element: document.body, 
    engine: engine, 
    options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' }
});

// 1. Create Player
const player = Bodies.rectangle(100, 100, 30, 60, { friction: 0.1, label: 'player', render: { visible: false } });
const startPlatform = Bodies.rectangle(100, 300, 400, 40, { isStatic: true, render: { fillStyle: '#8b4513' } });
Composite.add(engine.world, [player, startPlatform]);

let others = {};
let hazards = []; // Spikes and Saws

socket.emit('join', nick);

socket.on('init', data => {
    // Build Platforms
    data.platforms.forEach(p => {
        const plat = Bodies.rectangle(p.x, p.y, p.w, 30, { isStatic: true, render: { fillStyle: '#4d2600' } });
        Composite.add(engine.world, plat);

        // Randomly add a Spike or a Saw to some platforms
        if (Math.random() > 0.6) {
            const type = Math.random() > 0.5 ? 'saw' : 'spike';
            const hazard = Bodies.circle(p.x, p.y - 40, type === 'saw' ? 25 : 15, { 
                isStatic: true, 
                isSensor: true, // Detection only
                label: 'hazard'
            });
            hazard.hazardType = type;
            hazards.push(hazard);
            Composite.add(engine.world, hazard);
        }
    });
});

socket.on('updatePlayer', data => { if(others[data.id]) others[data.id] = {...others[data.id], ...data}; });
socket.on('newPlayer', data => { others[data.id] = data.data; });
socket.on('removePlayer', id => { delete others[id]; });

const keys = {};
window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;

let animCounter = 0;
let sawRotation = 0;

Events.on(engine, 'beforeUpdate', () => {
    // Movement Logic
    if (keys['d']) Body.setVelocity(player, { x: 5, y: player.velocity.y });
    if (keys['a']) Body.setVelocity(player, { x: -5, y: player.velocity.y });
    if (keys['w'] && Math.abs(player.velocity.y) < 0.5) Body.setVelocity(player, { x: player.velocity.x, y: -12 });
    
    // Death Logic (Lava or Falling)
    if (player.position.y > 1200) respawn();

    // Check for Hazard Collision
    hazards.forEach(h => {
        const dist = Math.hypot(player.position.x - h.position.x, player.position.y - h.position.y);
        if (dist < 40) respawn();
    });

    if (Math.abs(player.velocity.x) > 0.1) animCounter += 0.2;
    sawRotation += 0.1;
    
    socket.emit('move', { id: socket.id, x: player.position.x, y: player.position.y, anim: animCounter });

    // SCREEN FOLLOW: Center the camera on the player
    Render.lookAt(render, {
        min: { x: player.position.x - window.innerWidth/2, y: player.position.y - window.innerHeight/1.5 },
        max: { x: player.position.x + window.innerWidth/2, y: player.position.y + window.innerHeight/3 }
    });
});

function respawn() {
    Body.setPosition(player, { x: 100, y: 100 });
    Body.setVelocity(player, { x: 0, y: 0 });
}

// CUSTOM DRAWING (Stickmen + Hazards)
Events.on(render, 'afterRender', () => {
    const ctx = render.context;
    const cx = render.bounds.min.x;
    const cy = render.bounds.min.y;

    // Draw Saws & Spikes
    hazards.forEach(h => {
        ctx.save();
        ctx.translate(h.position.x - cx, h.position.y - cy);
        if (h.hazardType === 'saw') {
            ctx.rotate(sawRotation);
            ctx.fillStyle = "#333";
            for(let i=0; i<8; i++) {
                ctx.rotate(Math.PI/4);
                ctx.fillRect(-5, -30, 10, 20);
            }
            ctx.beginPath(); ctx.arc(0,0,15,0,Math.PI*2); ctx.fill();
        } else {
            ctx.fillStyle = "#222";
            ctx.beginPath(); ctx.moveTo(-15, 15); ctx.lineTo(0, -15); ctx.lineTo(15, 15); ctx.fill();
        }
        ctx.restore();
    });

    const drawStick = (x, y, name, anim, color) => {
        ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(x - cx, y - cy - 25, 8, 0, Math.PI * 2); // Head
        ctx.moveTo(x - cx, y - cy - 17); ctx.lineTo(x - cx, y - cy + 5); // Body
        ctx.moveTo(x - cx, y - cy - 10); ctx.lineTo(x - cx + Math.sin(anim)*15, y - cy); // Arms
        ctx.moveTo(x - cx, y - cy - 10); ctx.lineTo(x - cx - Math.sin(anim)*15, y - cy);
        ctx.moveTo(x - cx, y - cy + 5); ctx.lineTo(x - cx + Math.cos(anim)*15, y - cy + 25); // Legs
        ctx.moveTo(x - cx, y - cy + 5); ctx.lineTo(x - cx - Math.cos(anim)*15, y - cy + 25);
        ctx.stroke();
        ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; ctx.textAlign = "center";
        ctx.fillText(name, x - cx, y - cy - 50);
    };

    drawStick(player.position.x, player.position.y, nick, animCounter, "white");
    Object.values(others).forEach(p => drawStick(p.x, p.y, p.name, p.anim || 0, "#00ffcc"));
});

Render.run(render);
Runner.run(Runner.create(), engine);
</script>
</body>
</html>
